# ═══════════════════════════════════════════════════════════════════════════
#  SAFUU — Hardened Nginx Configuration
#  TLS 1.3 only · HSTS · Rate limiting · WAF-lite · Reverse proxy
#
#  SETUP:
#  1. Install: sudo apt install nginx certbot python3-certbot-nginx
#  2. Copy to: /etc/nginx/sites-available/safuu
#  3. Symlink: ln -s /etc/nginx/sites-available/safuu /etc/nginx/sites-enabled/
#  4. Get TLS:  certbot --nginx -d yourdomain.com
#  5. Reload:  nginx -t && systemctl reload nginx
# ═══════════════════════════════════════════════════════════════════════════

# ── Rate limiting zones (shared memory) ──────────────────────────────────────
# General API rate limiting
limit_req_zone $binary_remote_addr zone=api_general:10m    rate=60r/m;
# Stricter limit for sensitive endpoints
limit_req_zone $binary_remote_addr zone=api_strict:10m     rate=10r/m;
# Auth endpoint — very strict
limit_req_zone $binary_remote_addr zone=api_auth:10m       rate=5r/m;
# Telegram webhook — only Telegram IPs should hit this
limit_req_zone $binary_remote_addr zone=tg_webhook:10m     rate=100r/m;
# SMS webhook
limit_req_zone $binary_remote_addr zone=sms_webhook:5m     rate=30r/m;
# Static/public
limit_req_zone $binary_remote_addr zone=public:10m         rate=120r/m;

# Connection limits per IP
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ── GeoIP blocking (optional — requires ngx_http_geoip2_module) ──────────────
# Uncomment to restrict access by country:
# geoip2 /usr/share/GeoIP/GeoLite2-Country.mmdb {
#     $geoip2_data_country_code country iso_code;
# }
# map $geoip2_data_country_code $allowed_country {
#     ET  1;   # Ethiopia
#     US  1;   # USA (diaspora)
#     GB  1;   # UK
#     default 0;
# }

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # ACME challenge for Certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Main HTTPS server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name yourdomain.com www.yourdomain.com;

    # ── TLS Configuration (A+ on SSL Labs) ───────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/yourdomain.com/chain.pem;

    # TLS 1.2 minimum, 1.3 preferred
    ssl_protocols TLSv1.2 TLSv1.3;

    # Strong cipher suites only (TLS 1.2 fallback)
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;  # Let client choose (TLS 1.3 handles this)

    # Session config
    ssl_session_timeout 1d;
    ssl_session_cache   shared:MozSSL:10m;
    ssl_session_tickets off;  # Disable for perfect forward secrecy

    # OCSP stapling
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout    5s;

    # DH params (generate: openssl dhparam -out /etc/nginx/dhparam.pem 4096)
    ssl_dhparam /etc/nginx/dhparam.pem;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"            always;
    add_header X-Frame-Options           "DENY"               always;
    add_header X-XSS-Protection          "1; mode=block"      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' wss://yourdomain.com; frame-ancestors 'none';" always;
    add_header X-Robots-Tag              "noindex, nofollow"  always;  # Don't index this
    add_header Cross-Origin-Opener-Policy "same-origin"       always;
    add_header Cross-Origin-Embedder-Policy "require-corp"    always;

    # Remove server version
    server_tokens off;

    # ── Connection limits ─────────────────────────────────────────────────────
    limit_conn conn_limit 20;          # Max 20 simultaneous connections per IP
    client_max_body_size 25M;          # Max upload (voice files)
    client_body_timeout 30s;
    client_header_timeout 10s;
    send_timeout 30s;
    keepalive_timeout 65s;

    # ── Logging (no query params — may contain sensitive data) ───────────────
    log_format safuu_secure '$time_iso8601 $request_method $uri $status $body_bytes_sent';
    access_log /var/log/nginx/safuu_access.log safuu_secure;
    error_log  /var/log/nginx/safuu_error.log  warn;

    # ── Block bad bots & scanners ─────────────────────────────────────────────
    if ($http_user_agent ~* "(sqlmap|nikto|nmap|masscan|dirbuster|gobuster|wfuzz|burpsuite|nessus)") {
        return 444;  # Drop connection silently
    }

    # Block suspicious paths (common attack vectors)
    location ~* \.(php|asp|aspx|jsp|cgi|env|git|htaccess|htpasswd|sql|bak|conf|config|ini|log|sh|bash)$ {
        deny all;
        return 444;
    }

    # Block path traversal
    if ($request_uri ~* "(\.\./|\.\.%2F|%2e%2e)") {
        return 444;
    }

    # ── ROUTES ────────────────────────────────────────────────────────────────

    # Public landing page (static files)
    location / {
        limit_req zone=public burst=20 nodelay;
        root /var/www/safuu;
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # REST API → Node server (localhost only binding)
    location /api/ {
        limit_req zone=api_general burst=30 nodelay;

        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;      # Log for abuse investigation
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_hide_header  X-Powered-By;

        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
    }

    # Auth endpoint — very strict rate limiting
    location /api/auth/ {
        limit_req zone=api_auth burst=3 nodelay;
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Export endpoint — even stricter
    location /api/export/ {
        limit_req zone=api_strict burst=5 nodelay;
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;  # Exports may take longer
    }

    # WebSocket — live dashboard events
    location /ws {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;   # Keep WS alive for 1 hour
    }

    # Telegram webhook (bot receives updates via webhook in production)
    location /telegram/webhook {
        limit_req zone=tg_webhook burst=50 nodelay;

        # Only allow Telegram IP ranges
        # Telegram IPs: https://core.telegram.org/bots/webhooks
        allow 149.154.160.0/20;
        allow 91.108.4.0/22;
        allow 91.108.56.0/22;
        allow 91.108.8.0/22;
        allow 95.161.64.0/20;
        allow 91.108.16.0/22;
        allow 91.108.12.0/22;
        deny all;

        proxy_pass http://127.0.0.1:3000/telegram/webhook;
        proxy_set_header Host $host;
    }

    # Africa's Talking webhook
    location /sms/ {
        limit_req zone=sms_webhook burst=10 nodelay;

        # Africa's Talking IPs
        allow 196.201.214.0/24;
        allow 196.201.215.0/24;
        deny all;

        proxy_pass http://127.0.0.1:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Health check (public, no rate limit for monitoring)
    location /health {
        proxy_pass http://127.0.0.1:3001/health;
        access_log off;
    }

    # Block access to data directory
    location /data/ { deny all; return 404; }
    location /.env  { deny all; return 404; }
    location /node_modules/ { deny all; return 404; }
}
